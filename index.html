<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PANDA - Pemetaan Anak melalui Diagnostik Awal</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#00539C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./assets/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    /* Perbaikan: Memastikan dropdown tampil bersih tanpa artefak */
    .form-control {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background-color: #fff;
    }
    select.form-control {
      appearance: auto; /* Mengembalikan tampilan default agar tidak ada lingkaran hitam */
    }
  </style>
</head>
<body>

  <header style="background-color: var(--md-surface); border-bottom: 1px solid var(--md-surface-variant); padding: 16px; position: sticky; top: 0; z-index: 100;">
    <div style="max-width: 600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <img src="https://yanuar-moga.github.io/app/sipanda/assets/logo_sipanda.png" alt="Logo PANDA" style="height: 40px; width: auto; object-fit: contain;">
        <div>
          <h1 style="font-size: 18px; font-weight: 800; color: var(--md-primary); letter-spacing: -0.5px; line-height: 1;">PANDA</h1>
          <span style="font-size: 11px; color: var(--md-on-surface-variant); font-weight: 500;">Pemetaan Diagnostik Awal</span>
        </div>
      </div>
      <span style="font-size: 12px; font-weight: 700; background-color: var(--md-primary-container); color: var(--md-on-primary-container); padding: 4px 10px; border-radius: 20px;">v1.0</span>
    </div>
  </header>

  <main class="panda-container" style="max-width: 600px; margin: 16px auto; padding: 0 16px;">
    
    <div class="md-card" style="background-color: var(--md-primary-container); color: var(--md-on-primary-container); border: none; padding: 20px; border-radius: 12px;">
      <h2 style="font-size: 22px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px;">Halo, Selamat Datang!</h2>
      <p style="font-size: 14px; opacity: 0.9; line-height: 1.5;">Silakan isi formulir diagnostik awal ini dengan sejujur-jujurnya.</p>
    </div>

    <form id="formDiagnostik" autocomplete="off" style="margin-top: 20px;">
      
      <div class="md-card" style="background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        <div class="md-title" style="font-weight: 700; font-size: 16px; margin-bottom: 4px;">Identitas Diri</div>
        <div class="md-subtitle" style="font-size: 12px; color: #666; margin-bottom: 16px;">Masukkan data diri kamu secara lengkap.</div>
        
        <div class="form-group" style="margin-bottom: 15px;">
          <label class="form-label" for="nama">Nama Lengkap</label>
          <input type="text" id="nama" class="form-control" placeholder="Contoh: Muhammad Andi" required>
        </div>
        
        <div class="form-group" style="margin-bottom: 15px;">
          <label class="form-label" for="nisn">NISN</label>
          <input type="number" id="nisn" class="form-control" placeholder="Contoh: 0123456789" required>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
          <label class="form-label" for="kelas">Kelas</label>
          <select id="kelas" class="form-control" required>
            <option value="" disabled selected>Pilih kelas kamu...</option>
            <option value="7A">7A</option>
            <option value="7B">7B</option>
            <option value="8A">8A</option>
            <option value="8B">8B</option>
            <option value="9A">9A</option>
            <option value="9B">9B</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn-primary" id="btnSubmit" style="width: 100%; padding: 14px; background: #00539C; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Kirim Data Diagnostik</button>
    </form>
  </main>

  <nav class="bottom-nav" style="position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee;">
    <a href="./index.html" class="nav-item active">📝 <span>Form</span></a>
    <a href="./dashboard.html" class="nav-item">📊 <span>Statistik</span></a>
    <a href="./guru.html" class="nav-item">👨‍🏫 <span>Guru</span></a>
    <a href="./walikelas.html" class="nav-item">📋 <span>Wali</span></a>
    <a href="./admin.html" class="nav-item">⚙️ <span>Admin</span></a>
  </nav>

  <script src="./assets/js/api.js"></script>
  <script>
    document.getElementById("formDiagnostik").addEventListener("submit", async (e) => {
      e.preventDefault();
      // Logika pengiriman data Anda tetap berjalan di sini
      Swal.fire('Berhasil', 'Data telah terkirim', 'success');
    });
  </script>
</body>
</html>
