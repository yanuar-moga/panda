<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Panda Assistant</title>
    <style>
        body { font-family: sans-serif; }
        #panda-icon { position: fixed; bottom: 20px; right: 20px; cursor: pointer; }
        #panda-chat { position: fixed; bottom: 20px; right: 20px; width: 320px; height: 450px; background: white; border: 1px solid #ccc; display: flex; flex-direction: column; z-index: 9999; }
        .hidden { display: none; }
        #chat-body { flex: 1; padding: 10px; overflow-y: auto; background: #e5ddd5; }
        .bubble { padding: 8px; margin: 5px; border-radius: 10px; }
        .panda { background: white; align-self: flex-start; }
        .user { background: #dcf8c6; align-self: flex-end; text-align: right; }
    </style>
</head>
<body>

    <div id="panda-icon" onclick="openChat()">Chat Panda</div>

    <div id="panda-chat" class="hidden">
        <div id="chat-body"></div>
        <div id="input-area">
            <input type="text" id="user-input">
            <button onclick="sendMessage()">Kirim</button>
        </div>
    </div>

    <script>
        // GANTI DENGAN URL DEPLOYMENT BARU ANDA
        const GAS_URL = "ISI_URL_DEPLOYMENT_ANDA_DISINI";

        function openChat() {
            document.getElementById('panda-chat').classList.remove('hidden');
        }

        function addMessage(text, sender) {
            const body = document.getElementById('chat-body');
            body.innerHTML += `<div class="bubble ${sender}">${text}</div>`;
            body.scrollTop = body.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if (!val) return;

            addMessage(val, 'user');
            input.value = '';

            try {
                // Mengirim sebagai GET parameter
                const url = `${GAS_URL}?question=${encodeURIComponent(val)}&userName=Pengunjung`;
                const res = await fetch(url, { method: 'GET' });
                const data = await res.json();
                addMessage(data.answer, 'panda');
            } catch(err) {
                addMessage("Koneksi gagal.", 'panda');
            }
        }
    </script>
</body>
</html>
