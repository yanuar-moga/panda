<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Assistant</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        /* Animasi */
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes tvOff { 0% { transform: scale(1, 1); filter: brightness(1); } 50% { transform: scale(1, 0.05); filter: brightness(5); } 100% { transform: scale(0, 0); filter: brightness(0); } }
        
        #panda-icon { position: fixed; bottom: 20px; right: 20px; cursor: pointer; z-index: 9999; }
        #panda-icon img { width: 70px; }
        
        #panda-chat { position: fixed; bottom: 20px; right: 20px; width: 320px; height: 450px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; z-index: 9999; }
        #panda-chat.open { animation: slideUp 0.4s ease-out; }
        #panda-chat.closing { animation: tvOff 0.5s ease-in forwards; }
        .hidden { display: none !important; }
        
        .header { background: #075E54; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-radius: 20px 20px 0 0; }
        .header-logo { width: 60px; margin-right: 10px; }
        
        #chat-body { flex: 1; padding: 15px; overflow-y: auto; background: #e5ddd5; }
        .bubble { padding: 8px 12px; margin: 5px; border-radius: 10px; max-width: 85%; }
        .panda { background: white; align-self: flex-start; }
        .user { background: #dcf8c6; align-self: flex-end; }
        
        #input-area { padding: 10px; background: white; display: flex; border-radius: 0 0 20px 20px; }
        #user-input { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
    </style>
</head>
<body>

    <audio id="sound-open" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
    <audio id="sound-close" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <div id="panda-icon" onclick="openChat()"><img src="https://yanuar-moga.github.io/panda/assistant/assets/mypanda.png"></div>

    <div id="panda-chat" class="hidden">
        <div class="header">
            <div style="display:flex; align-items:center;">
                <img src="https://yanuar-moga.github.io/panda/assistant/assets/mypanda.png" class="header-logo">
                <span>Panda Assistant</span>
            </div>
            <button onclick="closeChat()" style="background:none; border:none; color:white; cursor:pointer;">×</button>
        </div>
        <div id="chat-body"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Tanya sesuatu...">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const GAS_URL = "ISI_URL_DEPLOYMENT_ANDA_DISINI";

        function openChat() {
            document.getElementById('sound-open').play();
            document.getElementById('panda-icon').style.display = 'none';
            const chat = document.getElementById('panda-chat');
            chat.classList.remove('hidden', 'closing');
            chat.classList.add('open');
        }

        function closeChat() {
            document.getElementById('sound-close').play();
            const chat = document.getElementById('panda-chat');
            chat.classList.add('closing');
            setTimeout(() => {
                chat.classList.add('hidden');
                document.getElementById('panda-icon').style.display = 'block';
            }, 500);
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if (!val) return;
            
            // ... (logika fetch GET sama seperti sebelumnya) ...
        }
    </script>
</body>
</html>
