<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SIPANDA - Sekolah</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="panda-container">
        <button id="panda-btn">🐼</button>
        
        <div id="chat-window" class="hidden">
            <div id="chat-header">
                <span>SIPANDA 🐼</span>
                <button id="close-btn">×</button>
            </div>
            <div id="chat-messages">
                <div class="msg bot">Halo! Saya SIPANDA. Ada yang bisa saya bantu terkait sekolah?</div>
            </div>
            <div id="typing-indicator" class="hidden">SIPANDA sedang mengetik...</div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ketik pertanyaan...">
                <button id="send-btn">Kirim</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
