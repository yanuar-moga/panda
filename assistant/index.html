<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Assistant</title>
    <style>
        /* [Style Visual & Animasi] */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #panda-icon { position: fixed; bottom: 20px; right: 20px; cursor: pointer; z-index: 9999; }
        #panda-icon img { width: 70px; }
        
        #panda-chat { position: fixed; bottom: 20px; right: 20px; width: 320px; height: 450px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: visible; z-index: 9999; }
        .hidden { display: none !important; }
        
        .header { background: #4CAF50; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; position: relative; border-radius: 20px 20px 0 0; }
        .header-logo { width: 80px; height: auto; margin-right: 15px; margin-top: -50px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        
        #chat-body { flex: 1; padding: 15px; overflow-y: auto; background: #f0f2f5; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 14px; animation: fadeIn 0.4s ease; }
        .panda { align-self: flex-start; background: white; border: 1px solid #ddd; }
        .user { align-self: flex-end; background: #4CAF50; color: white; }
        
        #input-area { display: flex; padding: 10px; background: white; border-top: 1px solid #ddd; border-radius: 0 0 20px 20px; }
        #user-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; margin-right: 5px; }
        #send-btn { background: #4CAF50; border: none; color: white; padding: 0 15px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="panda-icon" onclick="openChat()"><img src="https://yanuar-moga.github.io/panda/assistant/assets/mypanda.png"></div>

    <div id="panda-chat" class="hidden">
        <div class="header">
            <div style="display:flex; align-items:center;">
                <img src="https://yanuar-moga.github.io/panda/assistant/assets/mypanda.png" class="header-logo">
                <span id="app-name" style="margin-top:-20px; font-weight:bold;"></span>
            </div>
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-weight:bold; cursor:pointer;">X</button>
        </div>
        <div id="chat-body"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Ketik pesan..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwcn1-_oGEwG-xWLlt-YdGXv-ti6mMxHMOBC9cNPBTKHoV0aed8Y1Zqs85tf3pKMZfsHg/exec";
        let isWaitingForName = false;

        function openChat() {
            document.getElementById('panda-icon').style.display = 'none';
            document.getElementById('panda-chat').classList.remove('hidden');
            
            // Typewriter Loop
            const el = document.getElementById('app-name');
            let text = "PANDA ASSISTANT   ";
            let i = 0;
            function type() {
                el.innerText = text.substring(0, i);
                i = (i + 1) % (text.length + 1);
                setTimeout(type, 150);
            }
            type();
            
            if (document.getElementById('chat-body').innerHTML === "") {
                addMessage("Halo! Saya Panda. Siapa nama kamu?", 'panda');
                isWaitingForName = true;
            }
        }

        function addMessage(text, sender) {
            const body = document.getElementById('chat-body');
            const div = document.createElement('div');
            div.className = `bubble ${sender}`;
            div.innerHTML = text;
            body.appendChild(div);
            body.scrollTop = body.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if (!val) return;

            addMessage(val, 'user');
            input.value = '';

            if (isWaitingForName) {
                localStorage.setItem('panda_user', val);
                isWaitingForName = false;
                addMessage(`Halo ${val}! Apa yang ingin ditanyakan?`, 'panda');
                return;
            }

            // Animasi Mengetik
            const body = document.getElementById('chat-body');
            const typing = document.createElement('div');
            typing.id = 'typing-indicator';
            typing.className = 'bubble panda';
            typing.innerHTML = "<i>Panda sedang mengetik...</i>";
            body.appendChild(typing);
            body.scrollTop = body.scrollHeight;

            try {
                // Jeda 1.5 detik untuk simulasi mengetik
                await new Promise(r => setTimeout(r, 1500));
                
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ question: val, userName: localStorage.getItem('panda_user') }) });
                const data = await res.json();
                
                typing.remove();
                addMessage(data.answer, 'panda');
            } catch(err) {
                typing.remove();
                addMessage("Maaf, gangguan teknis.", 'panda');
            }
        }

        function closeChat() {
            document.getElementById('panda-chat').classList.add('hidden');
            document.getElementById('panda-icon').style.display = 'block';
        }
    </script>
</body>
</html>
