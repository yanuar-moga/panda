<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="panda-icon" onclick="toggleChat()">
        <img src="https://yanuar-moga.github.io/app/sipanda/assets/logo_sipanda.png" alt="Panda">
    </div>

    <div id="panda-chat" class="hidden">
        <div class="header">
            <div style="display:flex; align-items:center;">
                <img src="https://yanuar-moga.github.io/app/sipanda/assets/logo_sipanda.png" style="width:30px; margin-right:10px;">
                <span id="app-name"></span>
            </div>
            <button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer; font-weight:bold;">X</button>
        </div>
        <div id="chat-body"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Ketik pertanyaan..." onkeydown="handleEnter(event)">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
